name: Keep backend warm

# Pings the Render backend's /health endpoint on a schedule so the free-tier
# dyno never goes to sleep. Without this, the first request after ~15 min of
# inactivity has to wait ~30-60s for a cold start.
#
# Setup:
#   1. Add a repo secret named BACKEND_HEALTH_URL with the full URL, e.g.
#      https://yukti-backend.onrender.com/health
#      (Repo Settings -> Secrets and variables -> Actions -> New repository secret)
#   2. That's it. The schedule below runs roughly every 10 minutes.
#
# Notes:
#   - GitHub's cron is best-effort and can be delayed 5-15 min under load.
#     If you need rock-solid 5-minute pings, use a free uptime monitor like
#     UptimeRobot or cron-job.org pointed at the same /health URL.
#   - Manual run: Actions tab -> "Keep backend warm" -> Run workflow.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend health endpoint
        env:
          URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::BACKEND_HEALTH_URL secret is not set."
            exit 1
          fi
          echo "Pinging $URL"
          # Up to 3 attempts with 60s timeout each to absorb cold-start latency.
          for i in 1 2 3; do
            code=$(curl -sS -o /tmp/body -w "%{http_code}" --max-time 60 "$URL" || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is awake."
              cat /tmp/body || true
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Backend did not return 200 after 3 attempts."
          cat /tmp/body || true
          exit 1
