# Render.com blueprint for the Yukti backend.
# You only need to click "New Blueprint" on Render and point it at this repo.
services:
  - type: web
    name: yukti-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/build_master_cache.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
